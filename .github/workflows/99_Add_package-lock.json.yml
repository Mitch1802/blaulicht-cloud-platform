name: 99 Add package-lock.json

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add_lockfile:
    name: Generate & commit package-lock.json
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate package-lock.json
        shell: bash
        run: |
          set -euo pipefail
          cd frontend
          npm install --package-lock-only --no-audit --no-fund

      - name: Commit & push package-lock.json (if changed)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/package-lock.json
          if git diff --cached --quiet; then
            echo "package-lock.json unchanged – nothing to commit."
          else
            git commit -m "chore: update frontend/package-lock.json [skip ci]"
            git push
          fi
