<imr-header [breadcrumb]="breadcrumb"></imr-header>

<section class="start-page atemschutz-page">
  <header class="welcome">
    <div class="welcome-main">
      <div>
        <h1>{{ title }}</h1>
      </div>
    </div>
  </header>

  <div class="dashboard-shell">
    <section class="module-section">
      <section class="category-block">
        <div class="category-head">
          <h3 class="category-title">Module</h3>
        </div>
        <div class="module-grid">
          <a class="module-card-link" routerLink="/atemschutz/masken">
            <imr-card cardClass="module-card" [wrapContent]="false">
              <div class="module-icon-shell">
                <imr-icon class="module-icon" [inline]="true">sports_motorsports</imr-icon>
              </div>
              <div class="module-card-body">
                <div class="module-title">Masken</div>
              </div>
            </imr-card>
          </a>

          <a class="module-card-link" routerLink="/atemschutz/geraete">
            <imr-card cardClass="module-card" [wrapContent]="false">
              <div class="module-icon-shell">
                <imr-icon class="module-icon" [inline]="true">battery_alert</imr-icon>
              </div>
              <div class="module-card-body">
                <div class="module-title">Geräte</div>
              </div>
            </imr-card>
          </a>

          <a class="module-card-link" routerLink="/atemschutz/messgeraete">
            <imr-card cardClass="module-card" [wrapContent]="false">
              <div class="module-icon-shell">
                <imr-icon class="module-icon" [inline]="true">flare</imr-icon>
              </div>
              <div class="module-card-body">
                <div class="module-title">Messgeräte</div>
              </div>
            </imr-card>
          </a>

          <a class="module-card-link" routerLink="/atemschutz/dienstbuch">
            <imr-card cardClass="module-card" [wrapContent]="false">
              <div class="module-icon-shell">
                <imr-icon class="module-icon" [inline]="true">menu_book</imr-icon>
              </div>
              <div class="module-card-body">
                <div class="module-title">Dienstbuch</div>
              </div>
            </imr-card>
          </a>
        </div>
      </section>
    </section>
    </div>
</section>
