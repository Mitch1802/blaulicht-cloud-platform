<imr-header [breadcrumb]="breadcrumb"></imr-header>

<imr-page-layout [title]="title" pageClass="start-page atemschutz-page">
  <imr-card title="Atemschutz">
    <div class="module-grid imr-grid">
      @for (item of moduleCards; track item.routerLink) {
        <a
          class="module-card-link imr-col-12 imr-col-md-6 imr-col-lg-3"
          [routerLink]="item.routerLink"
          [attr.aria-label]="'Modul öffnen: ' + item.titel"
        >
          <imr-card cardClass="module-card" [wrapContent]="false">
            <div class="module-icon-shell">
              <mat-icon class="module-icon">{{ item.icon }}</mat-icon>
            </div>
            <div class="module-card-body">
              <div class="module-title">{{ item.titel }}</div>
            </div>
          </imr-card>
        </a>
      }
    </div>
  </imr-card>
</imr-page-layout>
