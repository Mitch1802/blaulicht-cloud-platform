<imr-header [breadcrumb]="breadcrumb"></imr-header>

<imr-page-layout title="Fahrzeug Check" class="fahrzeug-check-page">
  <imr-section-card [title]="'Fahrzeug Check – ' + (fahrzeug?.name || '')">

        <form [formGroup]="form" >
          <imr-form-field label="Titel">
            <input matInput formControlName="title" placeholder="z. B. Tagescheck" />
          </imr-form-field>

          <imr-form-field label="Allgemeine Notiz">
            <textarea matInput rows="2" formControlName="notiz"></textarea>
          </imr-form-field>

          <imr-divider></imr-divider>

          <div formArrayName="results" >
            @for (raum of raeumeView; track raum.name) {
              <imr-card cardClass="p-2">
                <h3 class="m-0 mb-2">{{ raum.name }}</h3>

                @for (item of raum.items; track item.index) {
                  <div class="app-grid mb-2" [formGroupName]="item.index">
                    <div class="app-col-12 app-col-md-6">
                      <imr-checkbox formControlName="checked">
                        {{ item.name }} (Soll: {{ item.menge }} {{ item.einheit }})
                      </imr-checkbox>
                    </div>

                    <div class="app-col-12 app-col-md-6">
                      <imr-form-field label="Notiz">
                        <input matInput formControlName="notiz" placeholder="Optional" />
                      </imr-form-field>
                    </div>
                  </div>
                }
              </imr-card>
            }
          </div>

          <imr-top-actions>
            <imr-button color="accent" type="button" (click)="submit()">
              Checkliste speichern
            </imr-button>
          </imr-top-actions>
        </form>
  </imr-section-card>
</imr-page-layout>
