<div class="login-page">
  <imr-card class="login-card">
    <img class="login-logo" mat-card-image src="../../assets/images/logo.svg" alt="Logo" />
      <form class="login-form" [formGroup]="form" (ngSubmit)="anmelden()">
        <p>
          <imr-form-field label="Benutzername" hintLabel="* Pflichtfeld">
            <input matInput formControlName="user" type="text" autocomplete="username" autocapitalize="none" spellcheck="false" autofocus uiControlErrors>
          </imr-form-field>
        </p>
        <imr-form-field label="Passwort">
          <input matInput formControlName="pwd" [type]="showPassword ? 'text' : 'password'" autocomplete="current-password" uiControlErrors>
          <imr-suffix>
            <imr-button
              variant="icon"
              type="button"
              (click)="togglePasswordVisibility()"
              [ariaLabel]="showPassword ? 'Passwort verbergen' : 'Passwort anzeigen'"
              [attr.aria-pressed]="showPassword"
            >
              <imr-icon>{{showPassword?'visibility_off':'visibility'}}</imr-icon>
            </imr-button>
          </imr-suffix>
        </imr-form-field>
        <div class="login-button-row">
          <imr-button type="submit" color="primary" class="submit-button" [disabled]="form.invalid || isSubmitting">
            Anmelden
          </imr-button>
        </div>

      </form>
  </imr-card>
  @if (versionInfo) {
  <div class="login-footer">
    <div>Version: {{ versionInfo.version }} ({{ versionInfo.commit }})</div>
    @if (isTestVersion && screenResolution) {
      <div class="login-resolution">Auflösung: {{ screenResolution }}</div>
    }
  </div>
  }
</div>
