<imr-page-layout pageClass="invite-page">
  <imr-section title="Einladung abschließen" class="invite-card">
      @if (tokenMissing) {
        <p class="invite-note error">Der Einladungslink ist unvollständig. Bitte fordere eine neue Einladung an.</p>
      } @else {
        <p class="invite-note">Bitte vergib ein neues Passwort für deinen Zugang.</p>

        <form [formGroup]="form" (ngSubmit)="abschliessen()" class="invite-form">
          <input type="hidden" formControlName="token" />

          <mat-form-field class="imr-full-width">
            <mat-label>Neues Passwort</mat-label>
            <input matInput type="password" formControlName="password1" autocomplete="new-password" />
          </mat-form-field>

          <mat-form-field class="imr-full-width">
            <mat-label>Passwort wiederholen</mat-label>
            <input matInput type="password" formControlName="password2" autocomplete="new-password" />
          </mat-form-field>

          @if (!passwordsMatch && form.controls.password2.touched) {
            <p class="invite-note error">Passwörter stimmen nicht überein.</p>
          }

          <div class="invite-actions">
            <button mat-flat-button color="accent" type="submit" [disabled]="isSubmitting">
              Passwort setzen
            </button>
            <button mat-flat-button color="primary" type="button" [disabled]="isSubmitting" routerLink="/login">
              Zur Anmeldung
            </button>
          </div>
        </form>
      }
  </imr-section>
</imr-page-layout>
