<imr-page-layout pageClass="invite-page">
  <imr-section-card sectionTitle="Einladung abschließen" cardClass="invite-card">
      @if (tokenMissing) {
        <p class="invite-note error">Der Einladungslink ist unvollständig. Bitte fordere eine neue Einladung an.</p>
      } @else {
        <p class="invite-note">Bitte vergib ein neues Passwort für deinen Zugang.</p>

        <form [formGroup]="form" (ngSubmit)="abschliessen()" class="invite-form">
          <input type="hidden" formControlName="token" />

          <imr-form-field class="imr-full-width" label="Neues Passwort">
            <input matInput type="password" formControlName="password1" autocomplete="new-password" uiControlErrors />
          </imr-form-field>

          <imr-form-field class="imr-full-width" label="Passwort wiederholen">
            <input matInput type="password" formControlName="password2" autocomplete="new-password" uiControlErrors />
          </imr-form-field>

          @if (!passwordsMatch && form.controls.password2.touched) {
            <p class="invite-note error">Passwörter stimmen nicht überein.</p>
          }

          <imr-top-actions class="invite-actions">
            <imr-button color="accent" type="submit" [disabled]="isSubmitting">
              Passwort setzen
            </imr-button>
            <imr-button color="primary" type="button" [disabled]="isSubmitting" routerLink="/login">
              Zur Anmeldung
            </imr-button>
          </imr-top-actions>
        </form>
      }
  </imr-section-card>
</imr-page-layout>
