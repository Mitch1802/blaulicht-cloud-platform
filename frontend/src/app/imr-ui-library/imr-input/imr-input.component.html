<mat-form-field
  [class]="fieldClass"
  [appearance]="appearance"
  [hintLabel]="hintLabel"
  [subscriptSizing]="subscriptSizing"
>
  @if (label) {
    <mat-label>
      {{ label }}
      @if (required) { * }
    </mat-label>
  }

  <input
    matInput
    [type]="type"
    [placeholder]="placeholder"
    [formControl]="control"
    [required]="required"
    [readonly]="readonly"
    [autocomplete]="autocomplete"
  />
</mat-form-field>
